<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/src/assets/Amagari_logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/Amagari_logo.png" />
    <script>
      ;(() => {
        const savedTheme = localStorage.getItem('amagari-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = savedTheme || (prefersDark ? 'dark' : 'light')
        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.style.colorScheme = theme
      })()
    </script>
    <meta
      name="description"
      content="Amagari Studio 官方网站。专注 Minecraft 地图汉化、本地化工作流、中文宣传视频，以及工作室成员的地图、模组、软件与其他创作。"
    />
    <title>Amagari Studio</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
