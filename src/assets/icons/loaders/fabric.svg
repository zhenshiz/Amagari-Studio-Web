<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Fabric</title>

  <!-- Rolled cloth silhouette -->
  <path
    fill="#596269"
    d="M11 1h4v3h3v2h3v2h2v5h-3v2h-3v3h-3v4H8v-2H5v-2H3v-2H1v-5h2V9h3V6h2V4h3V1Z"
  />

  <!-- Cloth body -->
  <path
    fill="#aeb8bb"
    d="M10 5h5v2h3v3h2v2h-3v3h-3v3h-3v2H8v-2H5v-2H3v-4h2V9h3V7h2V5Z"
  />
  <path fill="#c7d0d1" d="M10 6h4v2h3v3h-2v3h-3v3H9v2H7v-2H5v-4h2v-3h3V6Z" />
  <path fill="#dce2e2" d="M10 7h3v2h3v2h-2v2h-3v3H8v2H6v-4h2v-3h2V7Z" />

  <!-- Fold shadows and highlights -->
  <rect x="4" y="12" width="2" height="4" fill="#7d898e" />
  <rect x="7" y="8" width="2" height="3" fill="#8f9a9e" />
  <rect x="9" y="17" width="4" height="2" fill="#909b9f" />
  <rect x="12" y="10" width="3" height="2" fill="#e8eded" />
  <rect x="6" y="13" width="2" height="2" fill="#e8eded" />

  <!-- Rolled end -->
  <path fill="#4f585f" d="M14 2h3v3h3v2h2v5h-3v-2h-2V7h-3V2Z" />
  <path fill="#7f898e" d="M15 4h2v2h2v2h2v2h-2V9h-2V7h-2V4Z" />
  <rect x="18" y="10" width="3" height="2" fill="#aeb8bb" />

  <!-- Loose lower edge -->
  <rect x="8" y="20" width="6" height="3" fill="#596269" />
  <rect x="10" y="19" width="5" height="2" fill="#7d898e" />
</svg>
